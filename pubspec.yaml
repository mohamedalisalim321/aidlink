name: aidlink
description: AidLink - Offline Emergency Guidance App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Locale Storge
  shared_preferences:

  # Speech To Text
  flutter_tts: ^3.8.5

  # Url Launcher
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/AidLink Icon.png"
  adaptive_icon_background: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/emergencies/
    - assets/images/emergencies/bleeding/
    - assets/images/emergencies/breathing/
    - assets/images/emergencies/burn/
    - assets/images/emergencies/heart_attack/
    - assets/images/emergencies/stroke/

  fonts:
    - family: Schyler
      fonts:
        - asset: assets/fonts/Nunito.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700